name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  godot:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import project
        run: godot --headless --editor --quit --path .

      - name: Run GUT tests
        run: |
          if [ -d "addons/gut" ]; then
            godot --headless --path . -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -gexit
          fi