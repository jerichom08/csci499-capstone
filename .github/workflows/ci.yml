name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  godot-import:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install minimal runtime dependency
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libfontconfig1
          rm -rf /var/lib/apt/lists/*

      # Headless editor import + load. Fails on parse errors, missing resources, etc.
      - name: Import project (headless)
        run: godot --headless --editor --quit --path .
